<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Tai Chi Iga Päev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&family=Noto+Sans+JP:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Noto Sans JP','Segoe UI',system-ui,sans-serif;
  background:#F5F0E8;
  color:#3A3530;
  min-height:100vh;
  padding-bottom:90px;
  /* Subtle washi paper texture — fine diagonal fiber lines */
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.03'/%3E%3Cline x1='0' y1='0' x2='200' y2='200' stroke='%23D8CEBC' stroke-width='0.3' opacity='0.4'/%3E%3Cline x1='40' y1='0' x2='200' y2='160' stroke='%23D8CEBC' stroke-width='0.2' opacity='0.3'/%3E%3Cline x1='100' y1='0' x2='200' y2='100' stroke='%23D8CEBC' stroke-width='0.15' opacity='0.25'/%3E%3Cline x1='0' y1='60' x2='140' y2='200' stroke='%23D8CEBC' stroke-width='0.2' opacity='0.2'/%3E%3Cline x1='0' y1='130' x2='70' y2='200' stroke='%23D8CEBC' stroke-width='0.25' opacity='0.3'/%3E%3C/svg%3E");
}

.app{max-width:600px;margin:0 auto;padding:16px}

/* ===== HEADER — calligraphic simplicity ===== */
.header{text-align:center;padding:30px 0 20px;position:relative}
.header::after{content:'';display:block;width:60px;height:1px;background:linear-gradient(90deg,transparent,#C4A87C,transparent);margin:16px auto 0}
.header h1{font-family:'Noto Serif JP',serif;font-size:24px;color:#5C4D3C;font-weight:200;letter-spacing:6px}
.header .date{font-size:13px;color:#9C8E7C;margin-top:6px;letter-spacing:1px}
.streak{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid #C4A87C;color:#7C6D5C;padding:5px 18px;font-size:12px;margin-top:12px;letter-spacing:1px}

/* ===== QUOTE — ink wash panel with 氣 watermark ===== */
.quote-box{
  background:linear-gradient(135deg,#4A4035 0%,#3A3530 60%,#2E2A24 100%);
  padding:28px 24px;
  margin-bottom:16px;
  color:#E8E0D4;
  position:relative;
  overflow:hidden;
  border:1px solid #5C5348;
}
.quote-box::before{
  content:'氣';
  position:absolute;right:12px;top:4px;
  font-size:90px;opacity:.05;
  font-family:'Noto Serif JP',serif;color:#C4A87C;
  line-height:1;
}
.quote-box .qt{font-family:'Noto Serif JP',serif;font-size:15px;font-style:italic;line-height:1.8;color:#E8E0D4;font-weight:200;position:relative;z-index:1}
.quote-box .qa{font-size:11px;color:#A89880;margin-top:10px;letter-spacing:2px;position:relative;z-index:1}

/* ===== CARDS — aged paper ===== */
.card{
  background:#FFFDF8;
  padding:22px;
  margin-bottom:16px;
  box-shadow:0 1px 4px rgba(90,70,50,.06);
  border:1px solid #EDE6D8;
  position:relative;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#C4A87C,transparent)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #EDE6D8}
.card-head h2{font-family:'Noto Serif JP',serif;font-size:16px;color:#5C4D3C;font-weight:400;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.badge{background:transparent;border:1px solid #C4A87C;color:#8C7A62;padding:2px 10px;font-size:10px;letter-spacing:1px}
.badge-new{border-color:#C67B5C;color:#C67B5C}

/* ===== EXERCISE ITEMS ===== */
.ex{padding:16px 0;border-bottom:1px solid #EDE6D8}
.ex:last-child{border-bottom:none}
.ex-top{display:flex;align-items:flex-start;gap:14px}
.ex-chk{
  width:26px;height:26px;
  border:1.5px solid #C4A87C;
  flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-top:2px;transition:all .3s ease;
  background:transparent;
}
.ex-chk.done{background:#8BAA7C;border-color:#8BAA7C}
.ex-chk.done svg path{stroke:#fff}
.ex-info{flex:1}
.ex-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:400;color:#4A4035;letter-spacing:1px}
.ex-meta{font-size:11px;color:#A0937F;margin:4px 0 8px;letter-spacing:.5px;display:flex;align-items:center;gap:6px}

.ex-desc{font-size:13px;color:#6B6056;line-height:1.7}

/* Illustration area — sumi-e style */
.ex-illust{
  background:linear-gradient(180deg,#FAF7F0,#F0EBE0);
  padding:16px;
  margin-top:12px;
  text-align:center;
  min-height:120px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  border:1px solid #E8E0D0;
}
.ex-illust::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,#C4A87C 50%,transparent 90%);
}
.ex-illust::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,#C4A87C 50%,transparent 90%);
}

/* ===== TIP BOX — bamboo accent ===== */
.tip-box{
  background:linear-gradient(135deg,#F0EDE4,#EAE5DA);
  padding:22px;
  margin-bottom:16px;
  border-left:3px solid #8BAA7C;
  position:relative;
}
.tip-box h3{font-family:'Noto Serif JP',serif;font-size:14px;color:#5C4D3C;margin:8px 0 6px;font-weight:400;letter-spacing:1px}
.tip-box p{font-size:13px;color:#6B6056;line-height:1.7}

/* ===== TIMER ===== */
.timer-box{text-align:center;padding:24px 0}
.timer-num{font-family:'Noto Serif JP',serif;font-size:56px;font-weight:200;color:#5C4D3C;letter-spacing:6px}
.timer-lbl{font-size:12px;color:#9C8E7C;margin-bottom:16px;letter-spacing:2px}
.tbtn{
  padding:13px 30px;border:none;
  font-size:14px;cursor:pointer;margin:4px;
  letter-spacing:2px;
  font-family:'Noto Sans JP',sans-serif;
  transition:all .2s ease;
}
.tbtn-go{background:#5C4D3C;color:#F5F0E8}
.tbtn-go:active{background:#4A3E30}
.tbtn-stop{background:transparent;color:#5C4D3C;border:1px solid #C4A87C}
.tbtn-stop:active{background:#F0EBE0}

/* ===== LEARN ===== */
.learn-item{background:#FFFDF8;overflow:hidden;margin-bottom:16px;border:1px solid #EDE6D8}
.learn-top{
  background:linear-gradient(135deg,#F5F0E8,#EDE6D8);
  padding:24px;text-align:center;
  position:relative;
  min-height:100px;
  display:flex;align-items:center;justify-content:center;
}
.learn-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#C4A87C,transparent)}
.learn-body{padding:20px}
.learn-body h3{font-family:'Noto Serif JP',serif;font-size:15px;margin-bottom:8px;color:#4A4035;font-weight:400;letter-spacing:1px}
.learn-body p{font-size:13px;color:#6B6056;line-height:1.7}
.ltag{display:inline-block;background:transparent;border:1px solid #C4A87C;color:#8C7A62;padding:2px 10px;font-size:10px;margin-top:10px;letter-spacing:1px}

/* ===== PROGRESS ===== */
.prog-ring{width:150px;height:150px;margin:0 auto 16px;position:relative}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring .pv{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif JP',serif;font-size:28px;font-weight:200;color:#5C4D3C}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px}
.wd{text-align:center}
.wd .dot{width:34px;height:34px;margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Noto Sans JP',sans-serif}
.wd .dot.done{background:#8BAA7C;color:#fff}
.wd .dot.today{background:#5C4D3C;color:#F5F0E8}
.wd .dot.future{background:#EDE6D8;color:#9C8E7C}
.wd label{font-size:10px;color:#9C8E7C;letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;text-align:center;margin-top:8px}
.stat-cell{padding:12px 0}
.stats .sn{font-family:'Noto Serif JP',serif;font-size:28px;color:#5C4D3C;font-weight:200}
.stats .sl{font-size:11px;color:#9C8E7C;letter-spacing:1px;margin-top:2px}
.sec{display:none}.sec.on{display:block}

/* ===== NAVIGATION — brush stroke icons ===== */
.nav{
  display:flex;position:fixed;bottom:0;left:0;right:0;
  background:#FFFDF8;
  box-shadow:0 -1px 8px rgba(90,70,50,.06);
  z-index:99;
  border-top:1px solid #E8E0D0;
}
.nav::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#C4A87C,transparent);
}
.nav button{
  flex:1;padding:10px 4px 12px;border:none;background:none;
  font-size:10px;color:#A0937F;cursor:pointer;
  letter-spacing:1px;font-family:'Noto Sans JP',sans-serif;
  transition:color .2s ease;
  position:relative;
}
.nav button.on{color:#5C4D3C;font-weight:400}
.nav button.on::after{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:#C4A87C;
}
.nav button svg{display:block;margin:0 auto 4px;width:22px;height:22px}

.preset{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #EDE6D8;cursor:pointer;font-size:13px;color:#5C4D3C;letter-spacing:.5px;transition:background .2s}
.preset:active{background:#F5F0E8}
.preset:last-child{border-bottom:none}
.preset span:last-child{color:#A0937F;font-size:12px}

/* ===== ENSO DECORATION ===== */
.enso-deco{text-align:center;padding:20px 0 10px;opacity:.15}

/* ===== SECTION DIVIDER ===== */
.sec-divider{text-align:center;margin:8px 0 16px;position:relative}
.sec-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#D8CEBC,transparent)}
.sec-divider span{background:#F5F0E8;padding:0 16px;position:relative;z-index:1;font-size:11px;color:#B0A38E;letter-spacing:2px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="nav">
  <button class="on" id="n0" onclick="go(0)">
    <!-- Brush-stroke sun/horizon icon for "Today" -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 18 C6 16, 10 14, 12 14 C14 14, 18 16, 20 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <circle cx="12" cy="10" r="4" stroke="currentColor" stroke-width="1.2" fill="none"/>
      <line x1="12" y1="4" x2="12" y2="5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="17" y1="6" x2="16.3" y2="6.7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="7" y1="6" x2="7.7" y2="6.7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="19" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="5" y1="10" x2="6" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    </svg>Täna</button>
  <button id="n1" onclick="go(1)">
    <!-- Brush-stroke incense/time icon -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="12" y1="20" x2="12" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12 10 C11 8, 13 6, 12 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <path d="M12 8 C11 6, 13.5 4, 12.5 2" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.5"/>
      <ellipse cx="12" cy="21" rx="5" ry="1.5" stroke="currentColor" stroke-width="1" fill="none"/>
    </svg>Taimer</button>
  <button id="n2" onclick="go(2)">
    <!-- Brush-stroke scroll/book icon -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 4 C6 4, 6 20, 6 20" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M6 4 C8 3.5, 16 3, 18 4 L18 18 C16 17, 8 17.5, 6 18" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <line x1="9" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
      <line x1="9" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
      <line x1="9" y1="13" x2="13" y2="13" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
      <path d="M6 20 C8 19, 16 18.5, 18 20" stroke="currentColor" stroke-width="1" fill="none" stroke-linecap="round"/>
    </svg>Õpime</button>
  <button id="n3" onclick="go(3)">
    <!-- Brush-stroke mountain/path icon for progress -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 20 L9 8 L13 14 L16 10 L21 20" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M3 20 L21 20" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <circle cx="17" cy="6" r="2" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.5"/>
    </svg>Progress</button>
</div>

<script>
/* ====================================================
   SVG LIBRARY — Sumi-e ink wash illustrations
   ==================================================== */
var SVG = {};

// --- ENSO CIRCLE (incomplete zen circle) ---
SVG.enso = '<svg viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg">'
  +'<path d="M95 60 C95 79, 79 95, 60 95 C41 95, 25 79, 25 60 C25 41, 41 25, 60 25 C72 25, 82 31, 88 40"'
  +' stroke="#3A3530" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.15"'
  +' stroke-dasharray="2,0" />'
  +'</svg>';

// --- BAMBOO ---
SVG.bamboo = '<svg viewBox="0 0 100 140" width="80" xmlns="http://www.w3.org/2000/svg">'
  +'<g opacity="0.7">'
  +'<line x1="50" y1="10" x2="50" y2="130" stroke="#5C6B50" stroke-width="3" stroke-linecap="round"/>'
  +'<ellipse cx="50" cy="35" rx="4" ry="1.5" fill="none" stroke="#5C6B50" stroke-width="1.5"/>'
  +'<ellipse cx="50" cy="65" rx="4" ry="1.5" fill="none" stroke="#5C6B50" stroke-width="1.5"/>'
  +'<ellipse cx="50" cy="95" rx="4" ry="1.5" fill="none" stroke="#5C6B50" stroke-width="1.5"/>'
  // leaves
  +'<path d="M54 30 C60 22, 72 20, 78 24" stroke="#8BAA7C" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
  +'<path d="M54 28 C62 18, 68 22, 72 18" stroke="#8BAA7C" stroke-width="1.2" fill="none" stroke-linecap="round"/>'
  +'<path d="M46 60 C38 52, 28 54, 22 58" stroke="#8BAA7C" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
  +'<path d="M46 62 C40 56, 32 60, 26 56" stroke="#8BAA7C" stroke-width="1.2" fill="none" stroke-linecap="round"/>'
  +'<path d="M54 90 C62 82, 70 84, 76 80" stroke="#8BAA7C" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
  +'</g></svg>';

// --- WAVE / WATER ---
SVG.wave = '<svg viewBox="0 0 140 60" width="140" xmlns="http://www.w3.org/2000/svg">'
  +'<g opacity="0.5">'
  +'<path d="M10 30 C20 20, 30 20, 40 30 C50 40, 60 40, 70 30 C80 20, 90 20, 100 30 C110 40, 120 40, 130 30" stroke="#3A3530" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
  +'<path d="M5 40 C15 32, 25 32, 35 40 C45 48, 55 48, 65 40 C75 32, 85 32, 95 40 C105 48, 115 48, 125 40" stroke="#3A3530" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>'
  +'<path d="M15 48 C25 42, 32 42, 42 48 C52 54, 60 54, 70 48 C80 42, 88 42, 98 48" stroke="#3A3530" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.3"/>'
  +'</g></svg>';

// --- MOUNTAIN LANDSCAPE ---
SVG.mountain = '<svg viewBox="0 0 160 80" width="160" xmlns="http://www.w3.org/2000/svg">'
  +'<g opacity="0.4">'
  +'<path d="M0 70 L30 30 L50 50 L70 20 L90 45 L110 25 L140 55 L160 70" stroke="#3A3530" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
  +'<path d="M0 75 L40 55 L80 65 L120 50 L160 75" stroke="#3A3530" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>'
  +'<circle cx="130" cy="18" r="8" stroke="#3A3530" stroke-width="0.8" fill="none" opacity="0.3"/>'
  +'</g></svg>';

// --- CRANE ---
SVG.crane = '<svg viewBox="0 0 120 140" width="100" xmlns="http://www.w3.org/2000/svg">'
  +'<g opacity="0.6">'
  // body
  +'<ellipse cx="60" cy="80" rx="25" ry="15" fill="none" stroke="#3A3530" stroke-width="1.5"/>'
  // neck
  +'<path d="M72 70 C75 55, 70 40, 65 30" stroke="#3A3530" stroke-width="1.5" fill="none" stroke-linecap="round"/>'
  // head
  +'<circle cx="63" cy="28" r="5" fill="none" stroke="#3A3530" stroke-width="1.2"/>'
  // beak
  +'<line x1="58" y1="27" x2="52" y2="25" stroke="#3A3530" stroke-width="1.2" stroke-linecap="round"/>'
  // eye
  +'<circle cx="62" cy="26" r="1" fill="#3A3530"/>'
  // wing
  +'<path d="M45 75 C30 65, 25 70, 20 60" stroke="#3A3530" stroke-width="1.3" fill="none" stroke-linecap="round"/>'
  +'<path d="M48 78 C35 72, 28 76, 22 68" stroke="#3A3530" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>'
  // tail
  +'<path d="M82 78 C92 72, 96 68, 100 60" stroke="#3A3530" stroke-width="1.3" fill="none" stroke-linecap="round"/>'
  +'<path d="M84 82 C94 78, 98 72, 102 66" stroke="#3A3530" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>'
  // legs
  +'<line x1="55" y1="95" x2="50" y2="125" stroke="#3A3530" stroke-width="1.2" stroke-linecap="round"/>'
  +'<line x1="65" y1="95" x2="68" y2="125" stroke="#3A3530" stroke-width="1.2" stroke-linecap="round"/>'
  +'<path d="M45 125 L50 125 L55 125" stroke="#3A3530" stroke-width="1" stroke-linecap="round"/>'
  +'<path d="M63 125 L68 125 L73 125" stroke="#3A3530" stroke-width="1" stroke-linecap="round"/>'
  +'</g></svg>';

// --- TAI CHI FIGURE: Wuji standing ---
SVG.figWuji = '<svg viewBox="0 0 100 150" width="90" xmlns="http://www.w3.org/2000/svg">'
  +'<g stroke="#3A3530" fill="none" stroke-linecap="round" opacity="0.65">'
  +'<circle cx="50" cy="20" r="8" stroke-width="1.5"/>' // head
  +'<line x1="50" y1="28" x2="50" y2="85" stroke-width="1.8"/>' // spine
  +'<line x1="50" y1="45" x2="35" y2="70" stroke-width="1.5"/>' // left arm
  +'<line x1="50" y1="45" x2="65" y2="70" stroke-width="1.5"/>' // right arm

  +'<line x1="50" y1="85" x2="62" y2="130" stroke-width="1.5"/>' // right leg
  +'<path d="M33 130 L38 130 L42 132" stroke-width="1"/>' // left foot
  +'<path d="M58 132 L62 130 L67 130" stroke-width="1"/>' // right foot
  +'</g></svg>';

// --- TAI CHI FIGURE: Arms raising ---
SVG.figArmsUp = '<svg viewBox="0 0 100 150" width="90" xmlns="http://www.w3.org/2000/svg">'
  +'<g stroke="#3A3530" fill="none" stroke-linecap="round" opacity="0.65">'
  +'<circle cx="50" cy="20" r="8" stroke-width="1.5"/>'
  +'<line x1="50" y1="28" x2="50" y2="85" stroke-width="1.8"/>'
  +'<path d="M50 45 C45 38, 35 30, 30 22" stroke-width="1.5"/>' // left arm up
  +'<path d="M50 45 C55 38, 65 30, 70 22" stroke-width="1.5"/>' // right arm up

    h+='<div class="card"><div class="card-head"><h2>';
    // star/sparkle SVG
    h+='<svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M10 2 L11 8 L17 8 L12 12 L14 18 L10 14 L6 18 L8 12 L3 8 L9 8Z" stroke="#C4A87C" stroke-width="0.8" fill="none" opacity="0.6"/></svg>';
    h+=' Uus oskus</h2><span class="badge badge-new">UUS</span></div>';
    h+='<div style="text-align:center;padding:12px 0">'+LSVG[si]+'</div>';
    h+='<h3 style="font-family:\'Noto Serif JP\',serif;font-size:15px;color:#4A4035;font-weight:400;letter-spacing:1px;margin-bottom:8px">'+sk[0]+'</h3>';
    h+='<p style="font-size:13px;line-height:1.7;color:#6B6056">'+sk[1]+'</p>';
    h+='<span class="ltag">'+sk[2]+'</span></div>';
  }

  // TIP
  h+='<div class="tip-box">';
  h+='<div style="margin-bottom:4px">'+SVG.tipBambooLeaf+'</div>';
  h+='<h3>'+TP[ti][0]+'</h3>';
  h+='<p>'+TP[ti][1]+'</p></div>';

  // Enso decoration at bottom
  h+='<div class="enso-deco">'+SVG.enso+'</div>';
}

else if(page===1){
  h+='<div class="header">';
  // Incense/time decoration
  h+='<div style="margin-bottom:8px">'+SVG.wave+'</div>';
  h+='<h1>Taimer</h1>';
  h+='<div class="date">Harjutuse taimer</div></div>';

  h+='<div class="card">';
  h+='<div class="timer-box">';
  h+='<div class="timer-lbl" id="tlbl">Vali harjutus alt</div>';
  h+='<div class="timer-num" id="tdisp">00:00</div>';
  h+='<div style="margin-top:20px">';
  h+='<button class="tbtn tbtn-go" onclick="ttog()">Alusta</button>';
  h+='<button class="tbtn tbtn-stop" onclick="trst()">Algusesse</button>';
  h+='</div></div></div>';

  h+='<div class="card"><div class="card-head"><h2>';
  h+='<svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M3 17 C5 14, 9 12, 10 12 C11 12, 15 14, 17 17" stroke="#C4A87C" stroke-width="0.8" fill="none" stroke-linecap="round"/><circle cx="10" cy="8" r="3" stroke="#C4A87C" stroke-width="0.8" fill="none"/></svg>';
  h+=' Tänased harjutused</h2></div>';
  for(var i=0;i<exs.length;i++){
    h+='<div class="preset" onclick="tset(\''+exs[i][0].replace(/'/g,"\\'")+'\','+exs[i][1]+')">';
    h+='<span>'+exs[i][0]+'</span><span>'+exs[i][1]+' min</span></div>';
  }
  h+='</div>';

  h+='<div class="enso-deco">'+SVG.enso+'</div>';
}

else if(page===2){
  h+='<div class="header">';
  h+='<div style="margin-bottom:8px">'+SVG.crane+'</div>';
  h+='<h1>Õpime</h1>';
  h+='<div class="date">Tai chi alused ja filosoofia</div></div>';

  for(var i=0;i<LT.length;i++){
    var l=LT[i];
    h+='<div class="learn-item"><div class="learn-top">'+LSVG[i]+'</div>';
    h+='<div class="learn-body"><h3>'+l[0]+'</h3><p>'+l[1]+'</p>';
    h+='<span class="ltag">'+l[2]+'</span></div></div>';
  }

  h+='<div class="enso-deco">'+SVG.enso+'</div>';
}

else if(page===3){
  var done=S.tc?S.tc.length:0,total=exs.length,pct=Math.round(done/total*100);
  var circum=2*Math.PI*65;
  var off=circum-circum*pct/100;

  h+='<div class="header">';
  h+='<div style="margin-bottom:8px">'+SVG.mountain+'</div>';
  h+='<h1>Edasiminek</h1>';
  h+='<div class="date">Sinu teekond</div></div>';

  // Today's progress ring
  h+='<div class="card"><div class="card-head"><h2>';
  h+='<svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="7" stroke="#C4A87C" stroke-width="1" fill="none"/><path d="M10 3 A7 7 0 0 1 17 10" stroke="#8BAA7C" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>';
  h+=' Tänane progress</h2></div>';
  h+='<div class="prog-ring"><svg width="150" height="150">';
  h+='<circle cx="75" cy="75" r="65" fill="none" stroke="#EDE6D8" stroke-width="6"/>';
  h+='<circle cx="75" cy="75" r="65" fill="none" stroke="#8BAA7C" stroke-width="6" stroke-dasharray="'+circum+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/>';
  h+='</svg><div class="pv">'+pct+'%</div></div></div>';

  // Week grid
  h+='<div class="card"><div class="card-head"><h2>';
  h+='<svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="14" height="12" stroke="#C4A87C" stroke-width="0.8" fill="none"/><line x1="3" y1="9" x2="17" y2="9" stroke="#C4A87C" stroke-width="0.6"/><line x1="7" y1="5" x2="7" y2="3" stroke="#C4A87C" stroke-width="0.8" stroke-linecap="round"/><line x1="13" y1="5" x2="13" y2="3" stroke="#C4A87C" stroke-width="0.8" stroke-linecap="round"/></svg>';
  h+=' See nädal</h2></div>';
  h+='<div class="wgrid">';
  var dn2=['E','T','K','N','R','L','P'],now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay()+1);
  for(var i=0;i<7;i++){
    var dd=new Date(ws);dd.setDate(ws.getDate()+i);
    var k=dd.toISOString().slice(0,10),isT=k===today,isD=S.cd[k],isF=dd>now;
    var cls=isF?'future':isD?'done':isT?'today':'future';
    h+='<div class="wd"><div class="dot '+cls+'">'+dd.getDate()+'</div><label>'+dn2[i]+'</label></div>';
  }
  h+='</div></div>';

  // Statistics
  h+='<div class="card"><div class="card-head"><h2>';
  h+='<svg viewBox="0 0 20 20" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M4 16 L4 8" stroke="#C4A87C" stroke-width="1.5" stroke-linecap="round"/><path d="M10 16 L10 4" stroke="#C4A87C" stroke-width="1.5" stroke-linecap="round"/><path d="M16 16 L16 10" stroke="#C4A87C" stroke-width="1.5" stroke-linecap="round"/></svg>';
  h+=' Statistika</h2></div>';
  h+='<div class="stats">';
  h+='<div class="stat-cell"><div class="sn">'+S.te+'</div><div class="sl">Harjutusi tehtud</div></div>';
  h+='<div class="stat-cell"><div class="sn">'+S.tm+'</div><div class="sl">Minutit kokku</div></div>';
  h+='<div class="stat-cell"><div class="sn">'+S.st+'</div><div class="sl">Päeva järjest</div></div>';
  h+='<div class="stat-cell"><div class="sn">'+Math.floor(d/3)+'</div><div class="sl">Oskusi õpitud</div></div>';
  h+='</div></div>';

  h+='<div class="enso-deco">'+SVG.enso+'</div>';
}

a.innerHTML=h;
}

function tog(i){
var idx=S.tc.indexOf(i),exs=EX[wk()]||EX[1];
if(idx>=0){S.tc.splice(idx,1);S.te=Math.max(0,S.te-1);S.tm=Math.max(0,S.tm-exs[i][1])}
else{S.tc.push(i);S.te++;S.tm+=exs[i][1]}
if(S.tc.length===(EX[wk()]||EX[1]).length){S.cd[tk()]=1;ustk()}
sv();render();
}

function ustk(){var s=0,d=new Date();while(true){var k=d.toISOString().slice(0,10);if(S.cd[k]){s++;d.setDate(d.getDate()-1)}else break}S.st=s;sv()}

function tset(n,m){document.getElementById('tlbl').textContent=n;ttgt=m*60;tsec=0;utd()}
function ttog(){
if(trun){clearInterval(tmr);trun=false;document.querySelector('.tbtn-go').textContent='Jätka'}
else{trun=true;document.querySelector('.tbtn-go').textContent='Paus';
tmr=setInterval(function(){tsec++;utd();if(ttgt>0&&tsec>=ttgt){clearInterval(tmr);trun=false;document.querySelector('.tbtn-go').textContent='Valmis!';try{navigator.vibrate(500)}catch(e){}}},1000)}
}
function trst(){clearInterval(tmr);trun=false;tsec=0;utd();document.querySelector('.tbtn-go').textContent='Alusta'}
function utd(){var m=String(Math.floor(tsec/60)).padStart(2,'0'),s=String(tsec%60).padStart(2,'0');var el=document.getElementById('tdisp');if(el)el.textContent=m+':'+s}

render();
</script>
</body>
</html>
