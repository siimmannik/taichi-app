<!DOCTYPE html>
<html lang="et" data-theme="auto" data-text="normal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3A3530">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tai Chi Iga Päev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;600&family=Noto+Sans:wght@300;400;500;600&display=swap');

/* ============ THEME TOKENS ============ */
:root{
  --bg:#F1EADC; --bg2:#E9E0CF;
  --paper:#FFFDF8; --paper2:#FAF5EA;
  --ink:#33302B; --ink2:#5C4D3C; --soft:#8C8071;
  --line:#E6DCCB;
  --gold:#B2935F; --green:#7C9869; --terra:#C2714F; --terra-soft:#E4C6B5;
  --shadow:rgba(90,70,50,.10);
  --good:#7C9869;
}
[data-theme="dark"]{
  --bg:#1E1B17; --bg2:#252019;
  --paper:#2A2620; --paper2:#322C24;
  --ink:#EDE4D5; --ink2:#E2D5BF; --soft:#A89A84;
  --line:#39322A;
  --gold:#C7A877; --green:#94B07F; --terra:#D88E6E; --terra-soft:#5a4034;
  --shadow:rgba(0,0,0,.35);
  --good:#94B07F;
}
html[data-text="normal"]{font-size:18px}
html[data-text="large"]{font-size:21px}
html[data-text="xl"]{font-size:24px}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink)}
body{
  font-family:'Noto Sans','Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  padding-bottom:calc(5.2rem + env(safe-area-inset-bottom,0));
  line-height:1.6;
  transition:background .4s ease,color .4s ease;
}
.app{max-width:600px;margin:0 auto;padding:0 1rem 1rem}
.serif{font-family:'Noto Serif JP',serif}
img{max-width:100%;display:block}

/* ============ HERO ============ */
.hero{
  position:relative;margin:0 -1rem 1.1rem;height:13.5rem;overflow:hidden;
  background:linear-gradient(135deg,var(--ink2),var(--ink));
}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 35%;opacity:.96}
.hero::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(28,24,20,.05) 0%,rgba(28,24,20,.20) 45%,rgba(28,24,20,.72) 100%);}
.hero-txt{position:absolute;left:1.2rem;right:1.2rem;bottom:.9rem;z-index:2;color:#F5EEDF}
.hero-txt .greet{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
.hero-txt h1{font-family:'Noto Serif JP',serif;font-weight:400;font-size:1.7rem;letter-spacing:.06em;margin-top:.15rem;text-shadow:0 1px 8px rgba(0,0,0,.35)}
.hero-txt .date{font-size:.82rem;opacity:.9;margin-top:.15rem}
.streak-chip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,253,248,.16);
  border:1px solid rgba(255,253,248,.4);backdrop-filter:blur(4px);
  color:#F5EEDF;padding:.25rem .7rem;border-radius:2rem;font-size:.78rem;margin-top:.55rem}

/* ============ CARDS ============ */
.card{
  background:var(--paper);border-radius:1.1rem;padding:1.15rem;margin-bottom:1rem;
  box-shadow:0 2px 10px var(--shadow);border:1px solid var(--line);
}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem}
.card-head h2{font-family:'Noto Serif JP',serif;font-size:1.12rem;color:var(--ink2);font-weight:400;letter-spacing:.03em;display:flex;align-items:center;gap:.55rem}
.badge{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:.18rem .65rem;border-radius:2rem;font-size:.72rem;letter-spacing:.04em;white-space:nowrap}
.badge-new{border-color:var(--terra);color:var(--terra)}

/* ============ PRIMARY START BUTTON ============ */
.start-btn{
  width:100%;border:none;cursor:pointer;border-radius:1.1rem;
  background:linear-gradient(135deg,var(--ink2),var(--ink));
  color:#F5EEDF;padding:1.15rem 1.2rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:.9rem;text-align:left;
  box-shadow:0 4px 16px var(--shadow);transition:transform .15s ease,filter .15s ease;
}
.start-btn:active{transform:scale(.985);filter:brightness(1.08)}
.start-btn .play{flex-shrink:0;width:3rem;height:3rem;border-radius:50%;background:rgba(245,238,223,.16);border:1px solid rgba(245,238,223,.4);display:flex;align-items:center;justify-content:center}
.start-btn .stxt b{display:block;font-family:'Noto Serif JP',serif;font-weight:400;font-size:1.18rem;letter-spacing:.03em}
.start-btn .stxt span{font-size:.85rem;opacity:.85}

/* ============ QUOTE ============ */
.quote{
  background:linear-gradient(135deg,#473C30,#322D27);
  border-radius:1.1rem;padding:1.4rem 1.25rem;margin-bottom:1rem;color:#EFE7D9;position:relative;overflow:hidden;
  border:1px solid #56493b;
}
.quote::before{content:'氣';position:absolute;right:.4rem;top:-.6rem;font-size:5.5rem;opacity:.06;font-family:'Noto Serif JP',serif;color:#D9BE93;line-height:1}
.quote .qt{font-family:'Noto Serif JP',serif;font-style:italic;font-size:1.05rem;line-height:1.7;position:relative;z-index:1}
.quote .qa{font-size:.78rem;color:#C7B393;margin-top:.6rem;letter-spacing:.08em;position:relative;z-index:1}

/* ============ EXERCISE ROW ============ */
.exrow{display:flex;align-items:center;gap:.9rem;padding:.75rem 0;border-bottom:1px solid var(--line);cursor:pointer}
.exrow:last-child{border-bottom:none}
.exrow .num{flex-shrink:0;width:2.5rem;height:2.5rem;border-radius:.7rem;background:var(--paper2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Noto Serif JP',serif;font-size:1.05rem}
.exrow.done .num{background:var(--good);border-color:var(--good);color:#fff}
.exrow .exinfo{flex:1;min-width:0}
.exrow .exname{font-size:1rem;color:var(--ink);font-weight:500}
.exrow.done .exname{color:var(--soft)}
.exrow .exmeta{font-size:.8rem;color:var(--soft);margin-top:.1rem}
.exrow .chev{color:var(--soft);flex-shrink:0}

/* ============ TIP / SAFETY ============ */
.tip{background:var(--paper2);border-radius:1.1rem;padding:1.1rem 1.2rem;margin-bottom:1rem;border-left:4px solid var(--green)}
.tip.safe{border-left-color:var(--terra)}
.tip h3{font-family:'Noto Serif JP',serif;font-size:1rem;color:var(--ink2);font-weight:400;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
.tip p{font-size:.92rem;color:var(--ink);opacity:.9}

/* ============ LEARN ============ */
.learn{background:var(--paper);border-radius:1.1rem;overflow:hidden;margin-bottom:1rem;border:1px solid var(--line);box-shadow:0 2px 10px var(--shadow)}
.learn-top{background:linear-gradient(135deg,var(--paper2),var(--bg2));padding:1.4rem;display:flex;align-items:center;justify-content:center;min-height:6.5rem}
.learn-top svg{width:5rem;height:auto}
.learn-body{padding:1.1rem 1.2rem}
.learn-body h3{font-family:'Noto Serif JP',serif;font-size:1.12rem;color:var(--ink2);font-weight:400;margin-bottom:.4rem}
.learn-body p{font-size:.94rem;color:var(--ink);opacity:.92}
.ltag{display:inline-block;border:1px solid var(--gold);color:var(--gold);padding:.16rem .65rem;border-radius:2rem;font-size:.72rem;margin-top:.7rem;letter-spacing:.04em}

/* ============ PROGRESS ============ */
.ring-wrap{width:11rem;height:11rem;margin:.3rem auto 1rem;position:relative}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;display:block}
.ring-wrap .pv{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .pv b{font-family:'Noto Serif JP',serif;font-size:2.2rem;font-weight:300;color:var(--ink2)}
.ring-wrap .pv span{font-size:.78rem;color:var(--soft)}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:.4rem}
.wd{text-align:center}
.wd .dot{aspect-ratio:1;border-radius:.6rem;display:flex;align-items:center;justify-content:center;font-size:.85rem;background:var(--paper2);color:var(--soft);border:1px solid var(--line)}
.wd .dot.done{background:var(--good);color:#fff;border-color:var(--good)}
.wd .dot.today{outline:2px solid var(--gold);outline-offset:1px;color:var(--ink2);font-weight:600}
.wd label{font-size:.72rem;color:var(--soft);margin-top:.25rem;display:block}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.stat{background:var(--paper2);border-radius:.9rem;padding:.9rem;text-align:center;border:1px solid var(--line)}
.stat b{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:300;color:var(--ink2);display:block}
.stat span{font-size:.78rem;color:var(--soft)}
.month{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem;margin-top:.4rem}
.mcell{aspect-ratio:1;border-radius:.4rem;background:var(--paper2);border:1px solid var(--line)}
.mcell.on{background:var(--good);border-color:var(--good)}
.mcell.today{outline:2px solid var(--gold);outline-offset:-1px}
.mcell.blank{background:transparent;border:none}

/* ============ SETTINGS ============ */
.set-group{margin-bottom:1rem}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:.8rem;padding:.85rem 0;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-row .lbl{font-size:1rem;color:var(--ink)}
.set-row .lbl small{display:block;font-size:.78rem;color:var(--soft);margin-top:.1rem;font-weight:400}
.seg{display:inline-flex;background:var(--paper2);border-radius:.7rem;border:1px solid var(--line);overflow:hidden;flex-shrink:0}
.seg button{border:none;background:transparent;color:var(--soft);padding:.5rem .8rem;font-size:.9rem;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--ink2);color:#F5EEDF}
.toggle{width:3.4rem;height:1.9rem;border-radius:2rem;background:var(--line);border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--good)}
.toggle::after{content:'';position:absolute;top:.2rem;left:.2rem;width:1.5rem;height:1.5rem;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(1.5rem)}
.timeinput{font-family:inherit;font-size:1rem;padding:.45rem .6rem;border-radius:.6rem;border:1px solid var(--line);background:var(--paper2);color:var(--ink)}
.btn-line{width:100%;padding:.9rem;border-radius:.8rem;border:1px solid var(--line);background:var(--paper2);color:var(--ink2);font-family:inherit;font-size:.95rem;cursor:pointer}
.btn-danger{color:var(--terra);border-color:var(--terra-soft)}
.about{font-size:.84rem;color:var(--soft);line-height:1.6;text-align:center;padding:.5rem 0}

/* ============ SECTION TITLE ============ */
.ptitle{font-family:'Noto Serif JP',serif;font-size:1.45rem;font-weight:400;color:var(--ink2);text-align:center;padding:1.3rem 0 .2rem;letter-spacing:.05em}
.psub{text-align:center;color:var(--soft);font-size:.85rem;margin-bottom:1.1rem}

/* ============ FIGURE (animated demonstration) ============ */
.figbox{background:linear-gradient(180deg,var(--paper2),var(--bg2));border-radius:1rem;border:1px solid var(--line);padding:.6rem;display:flex;align-items:center;justify-content:center}
.figsvg{width:100%;height:auto;max-width:13rem;display:block;color:var(--ink)}
.figsvg .stroke{fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.figsvg .head{fill:var(--paper2)}
.figbox.lg .figsvg{max-width:17rem}
.figphoto{width:100%;border-radius:1rem;border:1px solid var(--line);display:block}

/* transform setup */
.armL,.armR,.legL,.legR,.head,.body{transform-box:view-box}
.armL{transform-origin:80px 92px}
.armR{transform-origin:120px 92px}
.legL{transform-origin:92px 150px}
.legR{transform-origin:108px 150px}
.head{transform-origin:100px 66px}
.body{transform-origin:100px 150px}
@media (prefers-reduced-motion:reduce){.figsvg *{animation:none!important}}

@keyframes f_sway{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes f_raiseL{0%,100%{transform:rotate(0)}50%{transform:rotate(72deg)}}
@keyframes f_raiseR{0%,100%{transform:rotate(0)}50%{transform:rotate(-72deg)}}
@keyframes f_shift{0%,100%{transform:translateX(-12px)}50%{transform:translateX(12px)}}
@keyframes f_cloudB{0%,100%{transform:translateX(-7px)}50%{transform:translateX(7px)}}
@keyframes f_cloudL{0%,100%{transform:rotate(10deg)}50%{transform:rotate(34deg)}}
@keyframes f_cloudR{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(-10deg)}}
@keyframes f_ball{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
@keyframes f_ballL{0%,100%{transform:rotate(0)}50%{transform:rotate(-8deg)}}
@keyframes f_ballR{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
@keyframes f_orb{0%,100%{transform:scale(.82);opacity:.38}45%{transform:scale(1.28);opacity:.7}}
@keyframes f_aura{0%,100%{transform:scale(.95);opacity:.16}50%{transform:scale(1.12);opacity:.3}}
@keyframes f_spin{to{transform:rotate(360deg)}}
@keyframes f_tilt{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes f_swL{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(8deg)}}
@keyframes f_patL{0%,100%{transform:rotate(0)}50%{transform:rotate(11deg)}}
@keyframes f_kneeR{0%,55%,100%{transform:rotate(0)}28%{transform:rotate(-30deg)}}
@keyframes f_kneeL{0%,50%,100%{transform:rotate(0)}78%{transform:rotate(30deg)}}
@keyframes f_rub{0%,100%{transform:rotate(0)}50%{transform:rotate(5deg)}}
@keyframes f_gatherL{0%,100%{transform:rotate(0)}45%{transform:rotate(125deg)}}
@keyframes f_gatherR{0%,100%{transform:rotate(0)}45%{transform:rotate(-125deg)}}

[data-anim="wuji"] .body{animation:f_sway 5s ease-in-out infinite}
[data-anim="raise"] .armL{animation:f_raiseL 6s ease-in-out infinite}
[data-anim="raise"] .armR{animation:f_raiseR 6s ease-in-out infinite}
[data-anim="shift"] .body{animation:f_shift 5s ease-in-out infinite}
[data-anim="cloud"] .body{animation:f_cloudB 6s ease-in-out infinite}
[data-anim="cloud"] .armL{animation:f_cloudL 6s ease-in-out infinite}
[data-anim="cloud"] .armR{animation:f_cloudR 6s ease-in-out infinite}
[data-anim="ball"] .ball{animation:f_ball 5s ease-in-out infinite;transform-box:view-box;transform-origin:100px 132px}
[data-anim="ball"] .armL{animation:f_ballL 5s ease-in-out infinite}
[data-anim="ball"] .armR{animation:f_ballR 5s ease-in-out infinite}
[data-anim="breathe"] .belly{animation:f_orb 10s ease-in-out infinite;transform-box:view-box;transform-origin:100px 128px}
[data-anim="breathe"] .body{animation:f_sway 10s ease-in-out infinite}
[data-anim="meditate"] .aura{animation:f_aura 6s ease-in-out infinite;transform-box:view-box;transform-origin:100px 120px}
[data-anim="warmup"] .ring{animation:f_spin 4s linear infinite}
[data-anim="neck"] .head{animation:f_tilt 5s ease-in-out infinite}
[data-anim="neck"] .ring{animation:f_spin 5s linear infinite}
[data-anim="stretch"] .armL{animation:f_swL 4s ease-in-out infinite}
[data-anim="stretch"] .armR{animation:f_swL 4s ease-in-out infinite reverse}
[data-anim="stretch"] .head{animation:f_tilt 7s ease-in-out infinite}
[data-anim="pat"] .armL{animation:f_patL .8s ease-in-out infinite}
[data-anim="pat"] .armR{animation:f_patL .8s ease-in-out infinite reverse}
[data-anim="knee"] .legR{animation:f_kneeR 4s ease-in-out infinite}
[data-anim="knee"] .legL{animation:f_kneeL 4s ease-in-out infinite}
[data-anim="warmpalms"] .armL{animation:f_rub .5s ease-in-out infinite}
[data-anim="warmpalms"] .armR{animation:f_rub .5s ease-in-out infinite reverse}
[data-anim="gather"] .armL{animation:f_gatherL 7s ease-in-out infinite}
[data-anim="gather"] .armR{animation:f_gatherR 7s ease-in-out infinite}
[data-anim="close"] .body{animation:f_sway 5s ease-in-out infinite}
[data-anim="close"] .cdot{animation:f_spin 6s linear infinite;transform-box:view-box;transform-origin:100px 135px}

/* ============ NAV ============ */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:90;display:flex;
  background:var(--paper);border-top:1px solid var(--line);
  box-shadow:0 -2px 12px var(--shadow);padding-bottom:env(safe-area-inset-bottom,0)}
.nav button{flex:1;border:none;background:none;cursor:pointer;color:var(--soft);
  padding:.6rem .2rem .7rem;font-size:.74rem;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:.25rem;letter-spacing:.02em}
.nav button svg{width:1.7rem;height:1.7rem;stroke:currentColor;fill:none}
.nav button.on{color:var(--ink2)}
.nav button.on svg{stroke:var(--gold)}

/* ============ GUIDED SESSION OVERLAY ============ */
.session{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;
  padding:env(safe-area-inset-top,0) 1rem calc(1rem + env(safe-area-inset-bottom,0));overflow-y:auto}
.session.on{display:flex}
.s-top{display:flex;align-items:center;gap:.8rem;padding:.9rem 0 .4rem}
.s-prog{flex:1;height:.45rem;background:var(--line);border-radius:1rem;overflow:hidden}
.s-prog i{display:block;height:100%;background:var(--gold);border-radius:1rem;transition:width .4s ease;width:0}
.s-count{font-size:.85rem;color:var(--soft);white-space:nowrap}
.s-close{width:2.6rem;height:2.6rem;border-radius:50%;border:1px solid var(--line);background:var(--paper);color:var(--ink2);font-size:1.4rem;cursor:pointer;flex-shrink:0;line-height:1}
.s-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.6rem;padding:.4rem 0}
.s-tag{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.s-name{font-family:'Noto Serif JP',serif;font-size:1.5rem;font-weight:400;color:var(--ink2);line-height:1.3}
.s-demo{width:100%;max-width:16rem;margin:.2rem auto}
.s-steps{list-style:none;text-align:left;max-width:22rem;margin:.2rem auto 0;width:100%}
.s-steps li{display:flex;gap:.6rem;padding:.32rem 0;font-size:1rem;color:var(--ink);opacity:.95}
.s-steps li b{color:var(--gold);font-family:'Noto Serif JP',serif;flex-shrink:0}
.s-support{display:inline-flex;align-items:center;gap:.45rem;background:var(--terra-soft);color:var(--ink2);padding:.35rem .8rem;border-radius:2rem;font-size:.82rem;margin-top:.2rem}
[data-theme="dark"] .s-support{color:var(--ink)}

/* timer ring */
.s-timer{position:relative;width:8.5rem;height:8.5rem;margin:.3rem auto}
.s-timer svg{transform:rotate(-90deg);width:100%;height:100%;display:block}
.s-timer .t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:2rem;color:var(--ink2)}

/* breathing orb */
.breath{position:relative;width:13rem;height:13rem;margin:.2rem auto;display:flex;align-items:center;justify-content:center}
.breath .orb{position:absolute;width:7rem;height:7rem;border-radius:50%;
  background:radial-gradient(circle at 50% 40%,var(--green),var(--ink2));opacity:.92;
  transition:transform .25s linear}
.breath .ring2{position:absolute;width:12.5rem;height:12.5rem;border-radius:50%;border:1px solid var(--gold);opacity:.4}
.breath .blabel{position:relative;z-index:2;color:#F5EEDF;font-family:'Noto Serif JP',serif;font-size:1.15rem;text-shadow:0 1px 4px rgba(0,0,0,.4)}

.s-ctrls{display:flex;gap:.7rem;padding:.8rem 0 .2rem;max-width:30rem;margin:0 auto;width:100%}
.s-ctrls button{flex:1;border:none;cursor:pointer;border-radius:.9rem;font-family:inherit;font-size:1rem;padding:1rem .6rem;min-height:3.4rem;display:flex;align-items:center;justify-content:center;gap:.4rem}
.s-prev{background:var(--paper);border:1px solid var(--line)!important;color:var(--ink2);flex:0 0 4rem!important}
.s-pause{background:var(--paper2);border:1px solid var(--line)!important;color:var(--ink2)}
.s-next{background:var(--ink2);color:#F5EEDF}

/* finish screen */
.s-finish{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.7rem;padding:1rem}
.session.finish .s-body,.session.finish .s-ctrls,.session.finish .s-top .s-prog,.session.finish .s-top .s-count{display:none}
.session.finish .s-finish{display:flex}
.s-finish h2{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:400;color:var(--ink2)}
.s-finish p{color:var(--ink);opacity:.9;max-width:20rem}
.s-finish .fstats{display:flex;gap:1.4rem;margin:.6rem 0}
.s-finish .fstats div b{font-family:'Noto Serif JP',serif;font-size:1.7rem;color:var(--gold);display:block}
.s-finish .fstats div span{font-size:.78rem;color:var(--soft)}
.s-finish .fbtn{background:var(--ink2);color:#F5EEDF;border:none;border-radius:.9rem;padding:1rem 2.2rem;font-family:inherit;font-size:1.05rem;cursor:pointer;margin-top:.4rem}

/* toast */
.toast{position:fixed;left:50%;bottom:6rem;transform:translateX(-50%) translateY(1rem);z-index:300;
  background:var(--ink);color:#F5EEDF;padding:.8rem 1.2rem;border-radius:2rem;font-size:.9rem;
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.fade{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== engagement additions ===== */
.sonnote{font-family:'Noto Serif JP',serif;font-size:1.05rem;color:var(--ink2);text-align:center;padding:.1rem .6rem 1rem;line-height:1.55;font-style:italic}
.start-short{width:100%;border:1px solid var(--line);background:var(--paper);color:var(--ink2);border-radius:1rem;padding:.85rem;margin:-.4rem 0 1rem;font-family:inherit;font-size:.95rem;cursor:pointer}
.start-short:active{background:var(--paper2)}
.s-finish .mile h2{color:var(--gold)}
.moodq{font-size:.95rem;color:var(--soft);margin-top:.5rem}
.moods{display:flex;gap:.5rem;margin:.3rem 0 .2rem;flex-wrap:wrap;justify-content:center}
.moods button{border:1px solid var(--line);background:var(--paper2);color:var(--ink2);border-radius:.8rem;padding:.6rem 1rem;font-family:inherit;font-size:.95rem;cursor:pointer}
.moods button.sel{background:var(--good);color:#fff;border-color:var(--good)}
.tomorrow{font-size:.92rem;color:var(--soft);margin-top:.4rem}
.fbtn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink2);border-radius:.9rem;padding:.7rem 1.4rem;font-family:inherit;font-size:.95rem;cursor:pointer;margin-top:.1rem}

/* ===== learn reader ===== */
.learn{cursor:pointer}
.learn-more{color:var(--gold);font-size:.8rem;margin-left:.4rem;white-space:nowrap}
.reader{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow-y:auto}
.reader.on{display:flex}
.r-top{position:sticky;top:0;background:var(--bg);padding:.7rem 1rem;border-bottom:1px solid var(--line);z-index:2}
.r-back{border:none;background:none;color:var(--ink2);font-family:inherit;font-size:1.05rem;cursor:pointer;padding:.5rem .3rem}
.r-body{max-width:620px;margin:0 auto;padding:1.2rem 1.35rem 3rem;width:100%}
.r-sym{display:flex;justify-content:center;padding:.4rem 0 1rem}
.r-sym svg{width:5rem;height:auto}
.r-body h2{font-family:'Noto Serif JP',serif;font-weight:400;font-size:1.55rem;color:var(--ink2);text-align:center;line-height:1.3}
.r-tag{display:block;text-align:center;color:var(--gold);font-size:.8rem;letter-spacing:.08em;margin:.45rem 0 1.4rem}
.r-body p{font-size:1.08rem;line-height:1.85;color:var(--ink);margin-bottom:1.15rem}

/* ===== moving demo + still reference ===== */
.s-demo{position:relative;max-width:15rem}
.s-ref{position:absolute;top:-.4rem;right:-.7rem;width:3.6rem;height:5.2rem;object-fit:cover;border-radius:.7rem;border:2px solid var(--paper);box-shadow:0 3px 10px var(--shadow);background:var(--paper2)}
.figbox.lg .figsvg{max-width:15rem}

/* ===== cross-fade illustrated motion ===== */
.s-demo.duo{position:relative;width:100%;max-width:14rem;aspect-ratio:424/760;margin:.2rem auto}
.s-demo.duo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:1rem;border:1px solid var(--line);box-shadow:0 2px 10px var(--shadow)}
@keyframes duoFadeA{0%,18%{opacity:1}50%{opacity:0}82%,100%{opacity:1}}
@keyframes duoFadeB{0%,18%{opacity:0}50%{opacity:1}82%,100%{opacity:0}}
.duoA{animation:duoFadeA 6.5s ease-in-out infinite}
.duoB{animation:duoFadeB 6.5s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.duoA,.duoB{animation:none}.duoB{opacity:0}}

/* ===== three-frame head-tilt cycle (cool-down stretch) ===== */
.s-demo.trio{position:relative;width:100%;max-width:14rem;aspect-ratio:424/760;margin:.2rem auto}
.s-demo.trio img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:1rem;border:1px solid var(--line);box-shadow:0 2px 10px var(--shadow)}
@keyframes triFadeA{0%,12%{opacity:1}25%{opacity:0}37%{opacity:0}50%{opacity:1}62%{opacity:1}75%{opacity:0}87%{opacity:0}100%{opacity:1}}
@keyframes triFadeB{0%,12%{opacity:0}25%,37%{opacity:1}50%,100%{opacity:0}}
@keyframes triFadeC{0%,62%{opacity:0}75%,87%{opacity:1}100%{opacity:0}}
.triA{animation:triFadeA 9s ease-in-out infinite}
.triB{animation:triFadeB 9s ease-in-out infinite}
.triC{animation:triFadeC 9s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.triA,.triB,.triC{animation:none}.triB,.triC{opacity:0}}

/* ===== breathing photo + gentle pulse ===== */
.s-demo.breathpic,.s-demo.photo{position:relative;width:100%;max-width:14rem;aspect-ratio:424/760;margin:.2rem auto;border-radius:1rem;overflow:hidden;border:1px solid var(--line);box-shadow:0 2px 10px var(--shadow)}
.bphoto{width:100%;height:100%;object-fit:cover;transform-origin:center;transition:transform .12s linear;display:block}
.blabel2{position:absolute;left:0;right:0;bottom:.7rem;text-align:center;color:#fff;font-family:'Noto Serif JP',serif;font-size:1.15rem;text-shadow:0 1px 8px rgba(0,0,0,.65)}
.s-demo.photo img{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center}
@keyframes breathePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
.s-demo.photo.pulse img{animation:breathePulse 9s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.s-demo.photo.pulse img{animation:none}}
</style>

var BENEFIT=["Su õlad ja selg said täna liikuda — uni tuleb kergemini.","Vereringe sai hoogu. Käed ja jalad tänavad sind.","Tasakaal läks täna veidi kindlamaks. Iga kord aitab.","Su liigesed said õrna liikumise — see hoiab nad nooremana.","Sügav hingamine rahustas närvid. Päev tuleb kergem.","Keha ja meel said hetke koos olla. Haruldane kingitus.","Pinge õlgades sai vabaks. Tunned end kergemana.","Süda sai rahuliku liikumise — just nii, nagu talle meeldib.","Jalad said tugevamaks. Need kannavad sind kindlalt edasi.","Sa andsid endale rahu. See jääb sinuga kogu päevaks."];

var LEARN=[["Mis on tai chi?", "Iidne Hiina liikumiskunst — aeglased pehmed liigutused, rahulik hingamine ja kohalolu. Sobib igale vanusele.", "Alused", "yinyang", ["Tai chi (täispikkuses tai chi chuan, hiina keeles 太极拳) sündis Hiinas sajandeid tagasi. Algselt oli see võitluskunst, kus aeglased liigutused peitsid endas enesekaitset. Aja jooksul märkasid inimesed, et need pehmed, voolavad liigutused teevad keha ja meele tervemaks — ja nii sai tai chist üle maailma armastatud tervise- ja lõõgastusharjutus.", "Tai chi tuum on lihtne: sa liigud väga aeglaselt ja sujuvalt, hingad rahulikult ja oled täielikult kohal selles, mida teed. Liigutused voolavad ühest teise nagu vesi, ilma katkestuste ja pingeta. Sa ei pea olema painduv, tugev ega noor — alustada võib igas vanuses ja igal kehal.", "Erinevalt paljudest spordialadest ei aja tai chi sind hingeldama ega higistama. See on õrn keha vastu, kuid teeb sügavat tööd: parandab tasakaalu, rahustab närvisüsteemi ja toob meelerahu. Paljud nimetavad seda liikuvaks meditatsiooniks.", "Hiinas näeb hommikuti parkides sadu inimesi, vanu ja noori, koos rahulikult tai chit harjutamas. See on igapäevane rituaal, mis annab päevale rahuliku alguse. Sina saad sama teha oma kodus, omas tempos ja oma keha järgi."]], ["Miks see on sulle hea", "Parandab tasakaalu, vähendab kukkumise ohtu, leevendab pinget ja aitab paremini magada.", "Tervis", "health", ["Tai chi tervisekasud ei ole pelgalt vana tarkus — neid on teaduslikult uuritud. Üks tuntumaid leide: regulaarne tai chi vähendab eakate kukkumisi märkimisväärselt, ühe suure uuringu järgi ligi poole võrra võrreldes tavaliste venitustega. Just seepärast soovitavad seda paljud arstid ja terviseasutused.", "Miks see tasakaalu nii hästi aitab? Tai chi liigutused kannavad raskust pidevalt ühelt jalalt teisele ja õpetavad keha tundma, kus ta ruumis on. See tugevdab jalalihaseid ja teritab tasakaalumeelt — kaks asja, mis vananedes nõrgenevad ja mis hoiavad sind püsti.", "Lisaks tasakaalule on tai chil teisigi kasusid: see hoiab liigesed liikuvana ja vähem jäigana, võib alandada vererõhku, leevendab kroonilist valu ning pinget õlgades ja seljas. Sügav rahulik hingamine rahustab närvisüsteemi, mis aitab paremini magada ja vähendab ärevust.", "Ja võib-olla kõige tähtsam: tai chi tõstab tuju ja annab enesekindlust. Kui tunned, et su keha on tugevam ja kindlam, julged rohkem liikuda ja elada täisväärtuslikku elu. Üks väike igapäevane praktika kannab vilja kogu päeva ja kogu elu jooksul."]], ["Ole turvaline", "Harjuta kindlal põrandal, hoia tool lähedal, liigu aeglaselt. Pearingluse korral peatu.", "Tähtis", "wuji", ["Tai chi on üks turvalisemaid liikumisviise, kuid mõni lihtne ettevaatusabinõu teeb selle veelgi kindlamaks. Harjuta tasasel, kindlal põrandal, kus pole libisevaid vaipu ega asju, mille otsa komistada. Kanna mugavaid, libisemiskindlaid jalanõusid või harjuta paljajalu, kui see on mugav.", "Hoia tugev tool käeulatuses. Tasakaaluharjutuste ajal võid ühe käega seljatoest kinni võtta — see ei ole nõrkus, vaid tarkus. Aja jooksul, kui tasakaal paraneb, vajad tuge üha vähem. Ära kunagi häbene tuge kasutada.", "Liigu alati aeglaselt ja ära kunagi pinguta üle. Tai chi ei tohi teha valu. Kerge venitus on hea, terav valu mitte. Hoia põlved pehmelt kõverdatuna, mitte lukus, ja jälgi, et põlv ei ulatuks üle varba. Kui miski tundub ebamugav, tee liigutust väiksemalt või jäta vahele.", "Kui tunned pearinglust, valu rinnus, hingeldust või tugevat väsimust, peatu kohe, istu maha ja puhka. Joo enne ja pärast harjutamist veidi vett. Ja kõige tähtsam: kui sul on mõni terviseprobleem või sa pole ammu liikunud, räägi enne alustamist oma arstiga. Tema teab sinu olukorda kõige paremini."]], ["Hinga õigesti", "Ninast sisse, suust välja. Lase kõhul kerkida ja vajuda. Hingamine juhib liikumist.", "Praktika", "breath", ["Hingamine on tai chi süda. Kui hingamine on rahulik ja sügav, järgnevad liigutused iseenesest. Põhireegel on lihtne: hinga sisse ninast ja välja suust, pehmelt ja vaikselt, ilma sundimata.", "Tai chis kasutame kõhuhingamist. Tavaliselt hingame pinnapealselt, ainult rinnaga. Kõhuhingamisel lased õhul minna sügavale: sissehingamisel paisub kõht õrnalt välja, väljahingamisel vajub tagasi sisse. Pane käsi kõhule ja tunne seda liikumist — see on sügav, loomulik hingamine, nagu hingab magav laps.", "Püüa hingata aeglaselt, näiteks neli sekundit sisse ja kuus sekundit välja. Pikem väljahingamine rahustab närvisüsteemi eriti hästi. Ära kunagi hoia hinge kinni ega pinguta; kui tunned end ebamugavalt, lase hingamisel lihtsalt loomulikult kulgeda.", "Aja jooksul hakkab hingamine liigutustega kokku sulama: käed tõusevad sissehingamisel, langevad väljahingamisel. Sa ei pea seda jõuga tegema — lihtsalt lase hingamisel liikumist juhtida. See ongi tai chi vaikne maagia: keha ja hingamine saavad üheks."]], ["Chi — eluenergia", "Chi on eluenergia, mis voolab läbi keha. Tai chi laseb sel vabalt liikuda.", "Filosoofia", "chi", ["Sõna chi (kirjutatakse 气 või 氣, hääldatakse umbes tšii) tähendab hiina mõtteviisis eluenergiat — seda nähtamatut jõudu, mis hoiab meid elus ja liikumises. Sama mõiste on jaapani keeles ki ja india traditsioonis praana. See on iidne viis kirjeldada elujõudu, mis meid läbib.", "Hiina meditsiini järgi voolab chi läbi keha kindlaid radu pidi, nagu jõed läbi maastiku. Kui see vool on vaba ja tasakaalus, oleme terved ja energilised. Kui chi kuskil takerdub või jääb seisma, võib tekkida väsimus, pinge või haigus. Tai chi eesmärk ongi hoida see vool vaba ja ühtlane.", "Aeglased pehmed liigutused, sügav hingamine ja lõdvestunud keha avavad chi tee. Sellepärast tunnedki sageli pärast harjutamist sooja, kerget ja elavat tunnet, eriti kätes ja kõhus. See on chi, mis on liikuma hakanud.", "Sa ei pea chisse uskuma, et tai chist kasu saada — paljud kogevad sama mõju kui lihtsalt head vereringet ja sügavat lõõgastust. Aga see iidne pilt aitab mõista, miks aeglus, pehmus ja hingamine on nii tähtsad. Tai chi tähendab sõna-sõnalt ülima jõu harjutust, ja see jõud on rahulik elujõud sinu sees."]], ["Yin ja Yang", "Vastandid täiendavad teineteist: pehme ja kõva, liikumine ja paigalseis.", "Filosoofia", "yinyang", ["Yin ja yang on hiina mõtteviisi süda — pilt sellest, kuidas maailm koosneb vastanditest, mis ei võitle, vaid täiendavad teineteist. Yin on pehme, vaikne, tume ja vastuvõttev; yang on kõva, aktiivne, hele ja andev. Üks ei saa olla ilma teiseta, nagu päev ei saa olla ilma ööta.", "Tuntud yin-yangi sümbol — must ja valge pool, mis voolavad ringis teineteise sisse — näitab seda ilusti. Kummaski pooles on väike täpp teisest värvist: ka kõige pimedamas öös on valguse seeme ja vastupidi. Miski pole kunagi täiesti üks või teine; kõik on pidevas õrnas liikumises.", "Tai chi nimi tulebki siit: 太极 (tai ji) tähendab ülimat piiri — seda hetke, kust yin ja yang sünnivad. Iga liigutus kannab seda tasakaalu. Kui üks käsi tõuseb (yang), teine langeb (yin). Kui üks jalg kannab raskust (täis, yang), on teine kerge (tühi, yin). Sa liigud kahe vahel sujuvalt edasi-tagasi.", "See õpetus ulatub kaugemale kui harjutus. Tai chi õpetab leidma tasakaalu ka elus: tegususe ja puhkuse, pingutuse ja lõõgastuse, andmise ja vastuvõtmise vahel. Kui õpid liikuma pehmelt vastandite vahel, muutub kogu elu rahulikumaks."]], ["Dantian — energiakeskus", "Kolm sõrme nabast allpool asub su energiakeskus. Hingamine ja liikumine algavad siit.", "Keha", "dantian", ["Dantian (丹田) on koht kõhus, umbes kolm sõrmelaiust allpool naba ja paar sõrme sissepoole. Hiina traditsioonis on see keha tähtsaim energiakeskus — koht, kus chi koguneb ja kust see kogu kehasse jaguneb.", "Kujutle dantiani kui keha rasket keset, oma gravitatsioonikeskust. Kui suunad oma tähelepanu ja hingamise sinna, muutub keha kindlamaks ja maandatumaks. Sa ei ela enam ainult peas, vaid kõhus — rahulikus, stabiilses keskmes. See aitab tasakaalu ja annab sügava rahutunde.", "Tai chis algavad kõik liigutused dantianist. Käed ja jalad ei liigu omaette — liikumine sünnib kehakeskmes ja levib sealt välja jäsemetesse, nagu lained, mis tekivad vee keskel. Sellepärast tunduvad meistrite liigutused nii sujuvad ja võimsad: jõud tuleb keskmest, mitte kätest.", "Sina ei pea sellest veel muretsema — alguses piisab, kui suunad hingamise õrnalt dantiani ja kujutled, kuidas seal koguneb soe energia. Aja jooksul õpid liikuma sealt sügavalt keskelt. See on üks tai chi sügavamaid ja toetavamaid õpetusi."]], ["Wuji — alguse seisak", "Algasend: seisad lõdvestunult, põlved pehmed, käed all. Kõik algab ja lõpeb siit.", "Praktika", "wuji", ["Iga tai chi praktika algab ja lõpeb wuji seisakuga. Sõna wuji (无极) tähendab piiritut ehk tühjust — seisundit enne kui yin ja yang sünnivad. See on vaikne, valmistav seisak, kust kõik liikumine välja kasvab.", "Wuji on lihtne, kuid mitte juhuslik. Seisa jalad õlgade laiuselt, varbad ette suunatud. Põlved on pehmed ja kergelt kõverdatud, mitte lukus. Raskus on jaotunud ühtlaselt mõlemale jalale, jalataldade keskele. Vaagen on neutraalne, alaselg pikk ja pehme.", "Ülakeha on kerge ja vaba. Lase õlgadel langeda, käed ripuvad loomulikult keha kõrval, küünarnukid pisut eemal. Kujutle õhukest niiti, mis tõmbab su pealage õrnalt taeva poole — see pikendab kaela ja selga ilma pinguta. Lõug on kergelt sisse tõmmatud, nägu lõdvestunud, võid kergelt naeratada.", "Seisa nii hetk vaikselt ja hinga. See näiliselt lihtne seisak õpetab juba kõike tähtsat: lõdvestust, juurdumist, tasakaalu ja kohalolu. Nagu tühi lõuend enne maalimist — wuji on rahulik algus, kuhu sa võid alati tagasi pöörduda."]], ["Tai chi viis suurt stiili", "Chen, Yang, Wu, Sun ja Hao — viis koolkonda ühe juure küljes.", "Ajalugu", "yinyang", ["Tai chil on viis peamist stiili, mis kõik kasvasid välja ühest juurest, kuid arenesid eri perekondades omanäoliseks. Nende nimed tulevad perekondadelt, kes neid kujundasid.", "Chen on vanim stiil, millest kõik teised pärinevad. See on jõulisem ja vaheldusrikkam: aeglased pehmed liigutused vahelduvad ootamatute kiirete plahvatuste ja madalate asenditega. Chen nõuab rohkem jõudu ja sobib pigem noorematele või edasijõudnutele.", "Yang on tänapäeval kõige levinum stiil kogu maailmas — ja just seda õpime ka meie. Yang-stiil on sujuv, ühtlane ja graatsiline, liigutused on suured ja avarad, ilma järskude muutusteta. See on õrn keha vastu ja sobib suurepäraselt eakatele ning algajatele.", "Wu, Sun ja Hao on väiksemad koolkonnad, igaüks oma rõhuasetusega. Wu-stiil on kompaktsem, väiksemate liigutustega. Sun-stiil on vilgas ja kerge, sageli kasutusel just tervise ja liigesevaevuste leevendamiseks. Hao-stiil on kõige sisendlikum, peaaegu nähtamatute väliste liigutustega, keskendudes täielikult sisemisele energiale. Kõik viis jagavad sama hinge: aeglus, pehmus ja chi vaba vool."]], ["Aeglus on tai chi saladus", "Mida aeglasemalt liigud, seda sügavamale tai chi viib.", "Praktika", "wuji", ["Esmapilgul tundub kummaline, et liikumisharjutus on nii aeglane. Aga aeglus ongi tai chi saladus ja jõud. Kui liigud aeglaselt, märkad iga liigutuse pisidetaili: kuidas raskus kandub, kus tekib pinge, kuidas hingamine kulgeb. Kiirustades libiseks see kõik märkamatult mööda.", "Aeglus annab kehale aega õppida. Tasakaal, koordinatsioon ja lihasmälu paranevad just siis, kui teed liigutusi teadlikult ja rahulikult. Aeglane liikumine tugevdab lihaseid hellalt, ilma järskude liigutuste ja vigastusriskita — see on eriti hea liigestele.", "Aeglus rahustab ka meelt. Kiire maailm hoiab meid pidevas ärevuses; tai chi aeglane tempo on nagu sügav väljahingamine kogu kehale. Kui aeglustad liigutusi, aeglustub ka mõttetorm. Paljud ütlevad, et see on parim viis pingest vabaneda.", "Üks vana õpetus ütleb: kui arvad, et liigud juba piisavalt aeglaselt, liigu veel veidi aeglasemalt. Ära kunagi kiirusta. Tai chis ei ole eesmärki, kuhu jõuda — on ainult see rahulik hetk, milles sa praegu liigud. Just selles aegluses peitubki tervis ja rahu."]], ["Lõdvestus — pehmus võidab", "Tai chi tugevus tuleb lõdvestusest, mitte pingutusest.", "Filosoofia", "chi", ["Tai chis on üks põhimõte tähtsam kui peaaegu kõik teised: lõdvestus (hiina keeles song, 松). See ei tähenda lodevust ega jõuetust, vaid tarbetu pinge vabastamist — keha on ärkvel ja elus, kuid ilma krampita. Lihased teevad ainult nii palju tööd, kui vaja, ja mitte rohkem.", "Me kanname palju pinget, ise seda märkamatagi — õlgades, kaelas, näos, kätes. Tai chi õpetab seda pinget üles leidma ja lahti laskma. Iga väljahingamisega lased õlgadel veidi madalamale vajuda, lõual pehmeneda, kätel raskeks muutuda. Lõdvestunud keha liigub vabamalt ja chi voolab paremini.", "Vana tarkus ütleb: pehme võidab kõva. Mõtle, kuidas tugev tormituul murrab jäiga puu, kuid painduv pilliroog jääb terveks. Vesi on kõige pehmem aine, ometi uuristab see aja jooksul läbi kõige kõvema kivi. Tai chis õpime olema pigem nagu vesi ja pilliroog kui nagu jäik tamm.", "See õpetus kannab kaugele üle harjutuse. Kui õpid keha lõdvaks laskma, õpid sageli ka meelt lõdvaks laskma — vähem klammerdumist, vähem muret, rohkem rahu ja painduvust elu ees. Pehmus ei ole nõrkus; see on üks sügavamaid jõu vorme."]], ["Väike igapäevane harjumus", "Parem kümme rahulikku minutit iga päev kui tund korra nädalas.", "Praktika", "health", ["Tai chi kingitused ei tule ühest pikast pingutusest, vaid väikesest järjekindlast harjumusest. Kümme rahulikku minutit iga päev annab kehale ja meelele rohkem kui üks pikk tund korra nädalas. Keha õpib kordamise kaudu, ja iga päev jätab oma väikese jälje.", "Salajane abimees on rituaal. Vali kindel aeg ja koht — näiteks hommikul akna juures, enne hommikusööki. Kui harjutus seotakse millegagi, mida niikuinii iga päev teed, muutub see loomulikuks osaks päevast, mitte ülesandeks, mida meeles pidada.", "Ole iseenda vastu lahke. Mõnel päeval oled väsinud või hõivatud — siis tee lühem praktika või lihtsalt paar rahulikku hingetõmmet. See loeb ikka. Vahelejäänud päev ei ole läbikukkumine; tähtis on lihtsalt järgmisel päeval rahulikult tagasi tulla. Ükski seeria pole tähtsam kui sinu heaolu.", "Pea meeles, miks sa seda teed: et keha oleks tugevam ja kindlam, meel rahulikum, päevad kergemad. Iga kord, kui võtad endale need vaiksed minutid, teed kingituse iseendale. Aja jooksul ei ole tai chi enam see, mida sa teed — see on osa sellest, kes sa oled."]]];

/* ======================================================
   DAY / WEEK HELPERS
   ====================================================== */
function dayNum(){var s=new Date(S.start),t=new Date();s.setHours(0,0,0,0);t.setHours(0,0,0,0);return Math.max(1,Math.round((t-s)/864e5)+1);}
function weekNum(){return ((Math.ceil(dayNum()/7)-1)%8)+1;}
function exs(){return WEEKS[weekNum()].ex;}
function ensureDay(d){if(!S.days[d])S.days[d]={done:[],complete:false};return S.days[d];}
function todayRec(){return ensureDay(today());}

function rolloverCheck(){var t=today();if(S.lastDay!==t){S.lastDay=t;ensureDay(t);persist();}}

function recomputeStreak(){
  var s=0,d=new Date();
  while(true){var k=dstr(d);if(S.days[k]&&S.days[k].complete){s++;d.setDate(d.getDate()-1);}else break;}
  S.streak=s; if(s>S.best)S.best=s;
}

function toggleExercise(i){
  var dd=todayRec(),pos=dd.done.indexOf(i),e=exs()[i];
  if(pos>=0){dd.done.splice(pos,1);S.stats.exercises=Math.max(0,S.stats.exercises-1);S.stats.minutes=Math.max(0,S.stats.minutes-e.m);}
  else{dd.done.push(i);S.stats.exercises++;S.stats.minutes+=e.m;}
  var wasC=dd.complete,nowC=dd.done.length>=exs().length;dd.complete=nowC;
  if(nowC&&!wasC)S.stats.sessions++;
  recomputeStreak();persist();
}

function completeDayFull(){
  var dd=todayRec(),list=exs(),added=0,mins=0;
  for(var i=0;i<list.length;i++){if(dd.done.indexOf(i)<0){dd.done.push(i);added++;mins+=list[i].m;}}
  S.stats.exercises+=added;S.stats.minutes+=mins;
  if(!dd.complete){dd.complete=true;S.stats.sessions++;}
  recomputeStreak();persist();
}

/* ======================================================
   THEME / TEXT
   ====================================================== */
function applyTheme(){
  var th=S.set.theme;
  if(th==='auto'){th=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
  document.documentElement.setAttribute('data-theme',th);
  document.documentElement.setAttribute('data-text',S.set.text);

   AUDIO (gentle bell via Web Audio)
   ====================================================== */
var actx=null;
function audio(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return actx;}
function bell(kind){
  if(!S.set.sound)return;var c=audio();if(!c)return;
  try{if(c.state==='suspended')c.resume();}catch(e){}
  var now=c.currentTime;
  var freqs=kind==='end'?[392,523.25,659.25]:[523.25,784];
  freqs.forEach(function(f,idx){
    var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;
    var t0=now+idx*(kind==='end'?0.18:0.0);
    g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(.22,t0+.02);
    g.gain.exponentialRampToValueAtTime(.0008,t0+1.8);
    o.connect(g);g.connect(c.destination);o.start(t0);o.stop(t0+2);
  });
}

    +'<div class="set-row"><div class="lbl">Näita fotosid<small>AI-pildid harjutustest (vajab internetti; muidu joonised)</small></div>'+tog('photos',s.photos)+'</div></div>';

  h+='<div class="card set-group"><div class="card-head"><h2>Meeldetuletus</h2></div>'
    +'<div class="set-row"><div class="lbl">Igapäevane meeldetuletus<small>Töötab, kui rakendus on avatud</small></div>'+tog('reminder',s.reminder.on)+'</div>'
    +'<div class="set-row"><div class="lbl">Kell</div><input type="time" class="timeinput" id="remTime" value="'+s.reminder.time+'"></div></div>';

  h+='<div class="card set-group"><div class="card-head"><h2>Andmed</h2></div>'
    +'<div class="set-row" style="border:none;padding-bottom:.3rem"><div class="lbl" style="width:100%">'
    +'<button class="btn-line" id="exportBtn" style="margin-bottom:.6rem">Salvesta edusammud failina</button>'
    +'<button class="btn-line btn-danger" id="resetBtn">Lähtesta kõik edusammud</button></div></div></div>';

  h+='<div class="about">Tai Chi Iga Päev · tehtud armastusega 🌿<br>See rakendus ei asenda arsti nõu. Uue harjutamise alustamisel pea nõu oma arstiga.</div>';
  return h;
}

function bindSettings(){
  document.querySelectorAll('[data-set]').forEach(function(b){
    b.onclick=function(){var n=b.getAttribute('data-set'),v=b.getAttribute('data-val');S.set[n]=v;persist();applyTheme();render();};
  });
  document.querySelectorAll('[data-toggle]').forEach(function(b){
    b.onclick=function(){var n=b.getAttribute('data-toggle');
      if(n==='reminder'){S.set.reminder.on=!S.set.reminder.on;if(S.set.reminder.on)requestNotify();}
      else S.set[n]=!S.set[n];
      persist();render();};
  });
  var rt=document.getElementById('remTime');if(rt)rt.onchange=function(){S.set.reminder.time=rt.value;persist();toast('Meeldetuletus kell '+rt.value);};
  var ex=document.getElementById('exportBtn');if(ex)ex.onclick=exportData;
  var rb=document.getElementById('resetBtn');if(rb)rb.onclick=function(){
    if(confirm('Kas oled kindel? See kustutab kõik edusammud.')){
      S.days={};S.stats={sessions:0,minutes:0,exercises:0,learned:0};S.streak=0;S.best=0;S.start=today();persist();toast('Edusammud lähtestatud');render();
    }};
}

function exportData(){
  try{var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='taichi-edusammud.json';a.click();
    setTimeout(function(){URL.revokeObjectURL(u);},1000);toast('Fail salvestatud');}catch(e){toast('Ei õnnestunud salvestada');}
}

/* ======================================================
   TOAST
   ====================================================== */
var toastT=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on');},2600);}

/* ======================================================
   NOTIFICATIONS / REMINDER
   ====================================================== */
function requestNotify(){if('Notification'in window&&Notification.permission==='default'){Notification.requestPermission();}}
var remFired='';
setInterval(function(){
  if(!S.set.reminder.on)return;
  var now=new Date(),hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(hm===S.set.reminder.time&&remFired!==today()){
    remFired=today();
    var dd=S.days[today()];if(dd&&dd.complete)return;
    if('Notification'in window&&Notification.permission==='granted'){
      try{new Notification('Tai Chi Iga Päev',{body:'Aeg rahulikuks hetkeks. Alustame tänast praktikat?'});}catch(e){}
    }
    toast('🌿 Aeg tänaseks praktikaks');
  }
},25000);

/* ======================================================
   GUIDED SESSION
   ====================================================== */
var SS={list:[],idx:0,rem:0,total:0,timer:null,paused:false,breath:null,wake:null,single:false};

function startSession(mode){
  audio();bell('start');
  var list=exs(),i;
  SS.single=false;SS.short=false;
  if(typeof mode==='number'){SS.list=[list[mode]];SS.single=true;SS.idx=0;}
  else if(mode==='short'){
    var br=null;for(i=0;i<list.length;i++){if(list[i].br){br=list[i];break;}}
    var sh=[list[0]];if(br&&sh.indexOf(br)<0)sh.push(br);
    var last=list[list.length-1];if(sh.indexOf(last)<0)sh.push(last);
    SS.list=sh;SS.short=true;SS.idx=0;
  }else{
    SS.list=list;var dd=todayRec(),start=0;
    for(i=0;i<list.length;i++){if(dd.done.indexOf(i)<0){start=i;break;}}
    if(dd.done.length>=list.length)start=0;
    SS.idx=start;
  }
  SS.paused=false;
  document.getElementById('session').classList.remove('finish');
  document.getElementById('session').classList.add('on');
  requestWake();
  loadStep();
}

function requestWake(){
  if(!S.set.wake||!('wakeLock'in navigator))return;
  try{navigator.wakeLock.request('screen').then(function(w){SS.wake=w;}).catch(function(){});}catch(e){}
}
function releaseWake(){try{if(SS.wake){SS.wake.release();SS.wake=null;}}catch(e){}}

function loadStep(){
  stopBreath();clearInterval(SS.timer);
  var e=SS.list[SS.idx];
  SS.total=e.m*60;SS.rem=SS.total;SS.paused=false;
  var realIdx=SS.single?exs().indexOf(e):SS.idx;
  var b=document.getElementById('sBody');

  var center;
  if(e.br&&e.a==='breathe'){
    center='<div class="s-demo breathpic"><img id="bPhoto" class="bphoto" src="images/move-breathe.jpg" alt="" onerror="this.style.opacity=0"><div class="blabel2" id="bLabel">Valmistu…</div></div>';
  }else{
    center=sessionDemo(e)
      +'<div class="s-timer"><svg width="136" height="136" viewBox="0 0 136 136">'
      +'<circle cx="68" cy="68" r="60" style="fill:none;stroke:var(--line);stroke-width:7"/>'
      +'<circle id="tRing" cx="68" cy="68" r="60" style="fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;stroke-dasharray:'+(2*Math.PI*60)+';stroke-dashoffset:0;transition:stroke-dashoffset 1s linear"/>'
      +'</svg><div class="t-num" id="tNum">'+fmt(SS.rem)+'</div></div>';
  }

  b.innerHTML='<div class="s-tag">'+e.t+'</div>'
    +'<div class="s-name">'+e.n+'</div>'
    +center
    +(e.su?'<div class="s-support">'+IC.chair+' Hoia tooli seljatoest kinni':'')+(e.su?'</div>':'')
    +'<ol class="s-steps">'+e.st.map(function(s,i){return '<li><b>'+(i+1)+'.</b> <span>'+s+'</span></li>';}).join('')+'</ol>';

  // progress + count
  document.getElementById('sProg').style.width=((SS.idx)/SS.list.length*100)+'%';
  document.getElementById('sCount').textContent=SS.single?'Üks harjutus':(SS.idx+1)+'/'+SS.list.length;
  document.getElementById('sPrev').style.visibility=(SS.idx===0)?'hidden':'visible';
  document.getElementById('sNext').textContent=(SS.idx>=SS.list.length-1)?'Lõpeta ✓':'Edasi ›';
  document.getElementById('sPause').textContent='Paus';

  if(e.br&&e.a==='breathe')startBreath();
  startTimer();
}

function fmt(s){var m=Math.floor(s/60),x=s%60;return m+':'+String(x).padStart(2,'0');}

function startTimer(){
  clearInterval(SS.timer);
  SS.timer=setInterval(function(){
    if(SS.paused)return;
    SS.rem--;
    var tn=document.getElementById('tNum');if(tn)tn.textContent=fmt(Math.max(0,SS.rem));
    var ring=document.getElementById('tRing');
    if(ring){var C=2*Math.PI*60;ring.style.strokeDashoffset=C*(1-SS.rem/SS.total);}
    // progress bar within step
    document.getElementById('sProg').style.width=((SS.idx+(1-SS.rem/SS.total))/SS.list.length*100)+'%';
    if(SS.rem<=0){clearInterval(SS.timer);bell('start');nextStep();}
  },1000);
}

/* breathing controller */
function startBreath(){
  var el=document.getElementById('bPhoto'),lab=document.getElementById('bLabel');
  if(!el)return;
  var start=performance.now(),cycle=10000;
  SS.breath=setInterval(function(){
    if(SS.paused)return;
    var p=((performance.now()-start)%cycle)/cycle,scale,txt;
    if(p<0.4){var k=p/0.4;scale=1.0+0.09*easeInOut(k);txt='Hinga sisse';}
    else{var k2=(p-0.4)/0.6;scale=1.09-0.09*easeInOut(k2);txt='Hinga välja';}
    el.style.transform='scale('+scale+')';
    if(lab&&lab.textContent!==txt)lab.textContent=txt;
  },60);
}
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function stopBreath(){if(SS.breath){clearInterval(SS.breath);SS.breath=null;}}

function nextStep(){
  if(SS.idx>=SS.list.length-1){finishSession();return;}
  SS.idx++;bell('start');loadStep();
}
function prevStep(){if(SS.idx>0){SS.idx--;loadStep();}}
function pauseStep(){SS.paused=!SS.paused;document.getElementById('sPause').textContent=SS.paused?'Jätka':'Paus';}

function finishSession(){
  clearInterval(SS.timer);stopBreath();releaseWake();bell('end');
  if(SS.single){
    var e=SS.list[0],i=exs().indexOf(e),dd=todayRec();
    if(dd.done.indexOf(i)<0){toggleExercise(i);}
    closeSession();toast('Harjutus tehtud ✓');return;
  }
  completeDayFull();
  var total=S.stats.sessions,mile=MILE[total],benefit=BENEFIT[dayNum()%BENEFIT.length];
  var fin=document.getElementById('sFinish');
  fin.innerHTML=(mile?'<div class="mile" style="opacity:.9">'+lsym('yinyang')+'<h2>'+mile+'</h2></div>'
                     :'<div style="opacity:.85">'+lsym('yinyang')+'</div><h2>Tubli!</h2>')
    +'<p>'+benefit+'</p>'
    +'<div class="moodq">Kuidas tunned end?</div>'
    +'<div class="moods"><button onclick="setMood(0,this)">Rahulik</button><button onclick="setMood(1,this)">Hea</button><button onclick="setMood(2,this)">Väsinud</button></div>'
    +'<div class="fstats"><div><b>'+total+'</b><span>päeva liikumist</span></div><div><b>'+S.streak+'</b><span>päeva järjest</span></div></div>'
    +'<div class="tomorrow">'+tomorrowLine()+'</div>'
    +(navigator.share?'<button class="fbtn-ghost" onclick="shareDone()">Jaga, et tegid ära</button>':'')
    +'<button class="fbtn" onclick="closeSession()">Valmis</button>';
  document.getElementById('session').classList.add('finish');
}

function closeSession(){
  clearInterval(SS.timer);stopBreath();releaseWake();
  document.getElementById('session').classList.remove('on','finish');
  go(0);
}

document.getElementById('sClose').onclick=function(){
  if(SS.single){closeSession();return;}
  if(confirm('Kas lõpetada praktika?'))closeSession();
};
document.getElementById('sNext').onclick=nextStep;
document.getElementById('sPrev').onclick=prevStep;
document.getElementById('sPause').onclick=pauseStep;

/* ======================================================
   INIT
   ====================================================== */
applyTheme();
renderNav();
render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
